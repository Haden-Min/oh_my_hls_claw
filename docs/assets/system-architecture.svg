<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="760" rx="28" fill="#0B1220"/>
  <text x="72" y="74" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">Oh_My_HLS_Claw System Architecture</text>
  <text x="72" y="112" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Intent flows through planning, score-based review loops, RTL generation, simulation, docs, and onboarding.</text>

  <rect x="70" y="170" width="220" height="96" rx="20" fill="#132238" stroke="#67E8F9" stroke-width="2"/>
  <text x="180" y="210" text-anchor="middle" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">User Intent</text>
  <text x="180" y="238" text-anchor="middle" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="17">natural language or reference code</text>

  <rect x="372" y="170" width="220" height="96" rx="20" fill="#1E293B" stroke="#A78BFA" stroke-width="2"/>
  <text x="482" y="210" text-anchor="middle" fill="#EDE9FE" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Planner</text>
  <text x="482" y="238" text-anchor="middle" fill="#DDD6FE" font-family="Segoe UI, Arial, sans-serif" font-size="17">draft architecture spec</text>

  <rect x="674" y="170" width="230" height="96" rx="20" fill="#1F2937" stroke="#F59E0B" stroke-width="2"/>
  <text x="789" y="210" text-anchor="middle" fill="#FEF3C7" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Manager</text>
  <text x="789" y="238" text-anchor="middle" fill="#FDE68A" font-family="Segoe UI, Arial, sans-serif" font-size="17">scores, critiques, normalizes plan</text>

  <rect x="1002" y="170" width="270" height="96" rx="20" fill="#14213A" stroke="#34D399" stroke-width="2"/>
  <text x="1137" y="210" text-anchor="middle" fill="#DCFCE7" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Workspace</text>
  <text x="1137" y="238" text-anchor="middle" fill="#A7F3D0" font-family="Segoe UI, Arial, sans-serif" font-size="17">spec / rtl / tb / sim / docs / onboard</text>

  <rect x="246" y="352" width="340" height="122" rx="22" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
  <text x="416" y="398" text-anchor="middle" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700">RTL Designer</text>
  <text x="416" y="430" text-anchor="middle" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="18">synthesizable Verilog-2001</text>
  <text x="416" y="456" text-anchor="middle" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="16">implementation revisions until the review score is perfect</text>

  <rect x="814" y="352" width="340" height="122" rx="22" fill="#0F172A" stroke="#4ADE80" stroke-width="2"/>
  <text x="984" y="398" text-anchor="middle" fill="#DCFCE7" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700">Verifier</text>
  <text x="984" y="430" text-anchor="middle" fill="#BBF7D0" font-family="Segoe UI, Arial, sans-serif" font-size="18">testbench + review + score</text>
  <text x="984" y="456" text-anchor="middle" fill="#86EFAC" font-family="Segoe UI, Arial, sans-serif" font-size="16">100-point gate before simulation and documentation</text>

  <rect x="156" y="582" width="300" height="98" rx="22" fill="#1E1B4B" stroke="#C084FC" stroke-width="2"/>
  <text x="306" y="622" text-anchor="middle" fill="#F5D0FE" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Guide Writer</text>
  <text x="306" y="650" text-anchor="middle" fill="#DDD6FE" font-family="Segoe UI, Arial, sans-serif" font-size="17">step reports and final docs</text>

  <rect x="550" y="582" width="300" height="98" rx="22" fill="#14262A" stroke="#22D3EE" stroke-width="2"/>
  <text x="700" y="622" text-anchor="middle" fill="#CFFAFE" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">CLI UX</text>
  <text x="700" y="650" text-anchor="middle" fill="#A5F3FC" font-family="Segoe UI, Arial, sans-serif" font-size="17">timed progress, spinner, checkpoints, clean</text>

  <rect x="944" y="582" width="300" height="98" rx="22" fill="#3F1D2E" stroke="#FB7185" stroke-width="2"/>
  <text x="1094" y="622" text-anchor="middle" fill="#FFE4E6" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Onboarder</text>
  <text x="1094" y="650" text-anchor="middle" fill="#FDA4AF" font-family="Segoe UI, Arial, sans-serif" font-size="17">constraints, wrappers, build assets</text>

