<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="720" rx="28" fill="#0B1220"/>
  <text x="72" y="74" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">Oh_My_HLS_Claw System Architecture</text>
  <text x="72" y="112" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Intent flows through planning, module design loops, verification, documentation, and onboarding.</text>

  <rect x="70" y="170" width="220" height="92" rx="20" fill="#132238" stroke="#67E8F9" stroke-width="2"/>
  <text x="180" y="208" text-anchor="middle" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">User Intent</text>
  <text x="180" y="236" text-anchor="middle" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="17">natural language or reference code</text>

  <rect x="372" y="170" width="220" height="92" rx="20" fill="#1E293B" stroke="#A78BFA" stroke-width="2"/>
  <text x="482" y="208" text-anchor="middle" fill="#EDE9FE" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Planner</text>
  <text x="482" y="236" text-anchor="middle" fill="#DDD6FE" font-family="Segoe UI, Arial, sans-serif" font-size="17">architecture spec + step graph</text>

  <rect x="676" y="170" width="220" height="92" rx="20" fill="#1F2937" stroke="#F59E0B" stroke-width="2"/>
  <text x="786" y="208" text-anchor="middle" fill="#FEF3C7" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Manager</text>
  <text x="786" y="236" text-anchor="middle" fill="#FDE68A" font-family="Segoe UI, Arial, sans-serif" font-size="17">state, step specs, approvals</text>

  <rect x="1000" y="170" width="270" height="92" rx="20" fill="#14213A" stroke="#34D399" stroke-width="2"/>
  <text x="1135" y="208" text-anchor="middle" fill="#DCFCE7" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Workspace</text>
  <text x="1135" y="236" text-anchor="middle" fill="#A7F3D0" font-family="Segoe UI, Arial, sans-serif" font-size="17">spec / rtl / tb / sim / docs / onboard</text>

  <rect x="312" y="360" width="320" height="116" rx="22" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
  <text x="472" y="404" text-anchor="middle" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700">RTL Designer</text>
  <text x="472" y="436" text-anchor="middle" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="18">synthesizable Verilog-2001</text>
  <text x="472" y="462" text-anchor="middle" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="16">minimal module implementation</text>

  <rect x="766" y="360" width="320" height="116" rx="22" fill="#0F172A" stroke="#4ADE80" stroke-width="2"/>
  <text x="926" y="404" text-anchor="middle" fill="#DCFCE7" font-family="Segoe UI, Arial, sans-serif" font-size="29" font-weight="700">Verifier</text>
  <text x="926" y="436" text-anchor="middle" fill="#BBF7D0" font-family="Segoe UI, Arial, sans-serif" font-size="18">testbench + review + verdict</text>
  <text x="926" y="462" text-anchor="middle" fill="#86EFAC" font-family="Segoe UI, Arial, sans-serif" font-size="16">goal-driven validation loop</text>

  <rect x="210" y="556" width="320" height="96" rx="22" fill="#1E1B4B" stroke="#C084FC" stroke-width="2"/>
  <text x="370" y="596" text-anchor="middle" fill="#F5D0FE" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Guide Writer</text>
  <text x="370" y="624" text-anchor="middle" fill="#DDD6FE" font-family="Segoe UI, Arial, sans-serif" font-size="17">step reports and final docs</text>

  <rect x="668" y="556" width="320" height="96" rx="22" fill="#3F1D2E" stroke="#FB7185" stroke-width="2"/>
  <text x="828" y="596" text-anchor="middle" fill="#FFE4E6" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Onboarder</text>
  <text x="828" y="624" text-anchor="middle" fill="#FDA4AF" font-family="Segoe UI, Arial, sans-serif" font-size="17">constraints, wrappers, build assets</text>

